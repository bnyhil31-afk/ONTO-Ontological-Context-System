name: ONTO — Tests and Linting
# Runs automatically on every push to main
# and on every pull request targeting main.
# All checks must pass before anything merges.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Scan dependencies for vulnerabilities
        run: |
          python -m venv /tmp/pip-audit-env
          /tmp/pip-audit-env/bin/pip install --quiet pip-audit
          /tmp/pip-audit-env/bin/pip-audit -r requirements-test.txt --desc
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt
          pip install --force-reinstall cryptography argon2-cffi
      - name: Verify cryptographic libraries installed
        run: |
          python -c "
          import sys
          missing = []
          try:
              import cryptography
              print(f'[OK] cryptography {cryptography.__version__}')
          except ImportError as e:
              missing.append('cryptography')
              print(f'[MISSING] cryptography: {e}')
          try:
              from argon2.low_level import hash_secret_raw, Type
              print('[OK] argon2-cffi (argon2.low_level) available')
          except (ImportError, ModuleNotFoundError) as e:
              missing.append('argon2-cffi')
              print(f'[MISSING] argon2.low_level: {e}')
          if missing:
              print(f'FATAL: required packages not installed: {missing}')
              sys.exit(1)
          print('All cryptographic libraries verified.')
          "
      - name: Normalize line endings on principles.txt
        run: |
          python3 -c "
          path = 'principles.txt'
          with open(path, 'rb') as f:
              content = f.read()
          normalized = content.replace(b'\r\n', b'\n').replace(b'\r', b'\n')
          if normalized != content:
              with open(path, 'wb') as f:
                  f.write(normalized)
              print('Line endings normalized.')
          else:
              print('Line endings already correct.')
          "
      - name: Verify principles are intact
        run: |
          python3 -c "
          import sys
          sys.path.insert(0, '.')
          from core.verify import verify_principles
          result = verify_principles()
          if not result:
              print('PRINCIPLES VERIFICATION FAILED.')
              print('The principles.txt file has been altered.')
              sys.exit(1)
          print('[OK] Principles verified and intact.')
          "
      - name: Run test suite
        run: |
          pytest tests/ -v --tb=short
      - name: Run linter
        run: |
          flake8 modules/ --max-line-length=88 --extend-ignore=E203,W503,E302
