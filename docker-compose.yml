# ONTO — Reference single-node deployment
#
# Usage:
#   docker compose up -d
#
# Before starting:
#   1. Copy .env.example to .env and fill in the values.
#   2. At minimum set for production:
#        ONTO_ENVIRONMENT=production
#        ONTO_DB_ENCRYPTION_KEY=<32-byte hex key>
#        ONTO_AUTH_REQUIRED=true
#        ONTO_AUTH_PASSPHRASE_HASH=<hash of your passphrase>
#   3. Generate a key: python3 -c "import secrets; print(secrets.token_hex(32))"
#
# Data persistence:
#   The SQLite database and auth state are stored in ./data/ on the host.
#   This directory is mounted into the container at /app/data.
#   Back up ./data/ to preserve your audit trail and graph state.
#
# Networking:
#   The API is bound to 127.0.0.1:8000 on the host by default.
#   Change the ports mapping if you need a different host port.
#   Do NOT expose port 8000 directly to the internet — put a TLS-terminating
#   reverse proxy (nginx, Caddy, Traefik) in front of it.

services:
  onto:
    build: .
    image: onto:latest
    container_name: onto
    restart: unless-stopped

    # Bind to localhost only — use a reverse proxy for external access
    ports:
      - "127.0.0.1:8000:8000"

    # Load all ONTO_* env vars from .env (never commit .env to git)
    env_file:
      - .env

    # Persist the database and auth state across container restarts
    volumes:
      - ./data:/app/data

    # Resource limits — prevent runaway processes from consuming host resources
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "512M"

    # Health check is defined in the Dockerfile; compose re-uses it here.
    # The service is not marked healthy until /health returns 200.
    healthcheck:
      test: >
        python3 -c
        "import urllib.request, sys;
         r = urllib.request.urlopen('http://localhost:8000/health', timeout=4);
         sys.exit(0 if r.status == 200 else 1)"
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

    # Log driver — use json-file with rotation so logs don't fill the disk
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
